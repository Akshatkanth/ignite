services:
  - type: web
    name: ignite-api
    env: node
    rootDir: .
    buildCommand: npm install --include=dev && npm run db:push --workspace @devflow/api && npm run build --workspace @devflow/shared && npm run build --workspace @devflow/api
    startCommand: npm run db:push --workspace @devflow/api && npm run start --workspace @devflow/api
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: ENABLE_DEPLOYMENT_WORKER
        value: "true"
      - key: CORS_ORIGIN
        value: "*"